<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Committees – Bwanali</title><link rel="stylesheet" href="/style.css"></head><body data-page="committees"><script src="/shared.js"></script><script>
var params=new URLSearchParams(window.location.search),tenant=params.get("tenant")||"demo",committees=[],staff=[];
async function loadData(){var r=await Promise.all([fetch("/api/committees?tenant="+tenant),fetch("/api/staff?tenant="+tenant)]);committees=await r[0].json();staff=await r[1].json();renderTable();}
function renderTable(){var tb=document.querySelector("#committeesTable tbody");tb.innerHTML="";if(!committees.length){tb.innerHTML='<tr><td colspan="5">No committees.</td></tr>';return;}committees.forEach(function(c){var chairPos=(c.positions||[]).find(p=>p.position==="Chairperson");var chair=staff.find(s=>s.id===(chairPos?chairPos.staff_id:null));var cn=chair?chair.first_name+" "+chair.last_name:"-";var total=((c.positions||[]).filter(p=>p.staff_id).length)+(c.members||[]).length;var row=document.createElement("tr");row.innerHTML='<td>'+c.name+'</td><td>'+(c.description||"-")+'</td><td>'+cn+'</td><td>'+total+'</td><td><button class="btn-icon edit-committee" data-id="'+c.id+'">✏️</button><button class="btn-icon delete-committee" data-id="'+c.id+'">🗑️</button></td>';tb.appendChild(row);});document.querySelectorAll(".edit-committee").forEach(b=>b.onclick=function(){editCommittee(b.dataset.id);});document.querySelectorAll(".delete-committee").forEach(b=>b.onclick=function(){deleteCommittee(b.dataset.id);});}
function openModal(c){var cont=document.getElementById("positionsContainer");cont.innerHTML="";["Chairperson","Vice Chairperson","Secretary","Treasurer"].forEach(function(pos){var existing=(c?c.positions||[]:[]).find(p=>p.position===pos);var sid=existing?existing.staff_id:"";var div=document.createElement("div");div.className="form-row";div.innerHTML='<div class="form-group"><label>'+pos+'</label><select class="position-staff"><option value="">-- Vacant --</option>'+staff.map(s=>'<option value="'+s.id+'"'+(s.id===sid?" selected":"")+'>'+s.first_name+" "+s.last_name+'</option>').join("")+"</select></div>";cont.appendChild(div);});if(c){document.getElementById("committeeId").value=c.id;document.getElementById("committeeName").value=c.name;document.getElementById("committeeDescription").value=c.description||"";}else{document.getElementById("committeeForm").reset();document.getElementById("committeeId").value="";}document.getElementById("committeeModal").style.display="block";}
function closeModal(){document.getElementById("committeeModal").style.display="none";}
async function saveCommittee(e){e.preventDefault();var id=document.getElementById("committeeId").value,name=document.getElementById("committeeName").value,desc=document.getElementById("committeeDescription").value;var positions=[];document.querySelectorAll("#positionsContainer .form-row").forEach(function(div){var pos=div.querySelector("label").textContent,staffId=div.querySelector("select").value;if(pos&&staffId)positions.push({position:pos,staff_id:staffId});});var url=id?"/api/committees/"+id+"?tenant="+tenant:"/api/committees?tenant="+tenant,method=id?"PUT":"POST";await fetch(url,{method:method,headers:{"Content-Type":"application/json"},body:JSON.stringify({name:name,description:desc,positions:positions,members:[]})});closeModal();loadData();}
function editCommittee(id){var c=committees.find(c=>c.id===id);if(c)openModal(c);}
function deleteCommittee(id){if(confirm("Delete?")){fetch("/api/committees/"+id+"?tenant="+tenant,{method:"DELETE"}).then(loadData);}}
document.addEventListener("DOMContentLoaded",async function(){
document.getElementById("page-content").innerHTML='<div class="module-header"><h2>Committees</h2><button class="btn-primary" id="addCommitteeBtn">+ Add Committee</button></div><div class="modal" id="committeeModal"><div class="modal-overlay"></div><div class="modal-content"><span class="modal-close" id="closeCommitteeModalBtn">&times;</span><h3>Add Committee</h3><form id="committeeForm"><input type="hidden" id="committeeId"><div class="form-row"><div class="form-group"><label>Name</label><input type="text" id="committeeName" required></div><div class="form-group"><label>Description</label><input type="text" id="committeeDescription"></div></div><fieldset><legend>Positions</legend><div id="positionsContainer"></div></fieldset><div class="form-actions"><button type="button" class="btn-secondary" id="cancelCommitteeBtn">Cancel</button><button type="submit" class="btn-primary">Save</button></div></form></div></div><div class="table-container"><table class="data-table" id="committeesTable"><thead><tr><th>Name</th><th>Description</th><th>Chairperson</th><th>Members</th><th>Actions</th></tr></thead><tbody></tbody></table></div>';
await loadData();document.getElementById("addCommitteeBtn").addEventListener("click",()=>openModal());document.getElementById("closeCommitteeModalBtn").addEventListener("click",closeModal);document.getElementById("cancelCommitteeBtn").addEventListener("click",closeModal);document.querySelector("#committeeModal .modal-overlay").addEventListener("click",closeModal);document.getElementById("committeeForm").addEventListener("submit",saveCommittee);
});
</script></body></html>
