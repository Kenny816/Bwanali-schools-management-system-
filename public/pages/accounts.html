<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Accounts – Bwanali</title><link rel="stylesheet" href="/style.css"><style>.tab-nav{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}.tab-btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;background:#ccc;color:#333;font-size:14px;}.tab-btn.active{background:#1e3c72;color:#fff;}.tab-content{display:none;}.tab-content.active{display:block;}.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:30px;}.stat-card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}.stat-card h3{font-size:14px;color:#666;text-transform:uppercase;margin-bottom:8px;}.stat-card .value{font-size:32px;font-weight:bold;color:#1e3c72;}</style></head><body data-page="accounts"><script src="/shared.js"></script><script>
var params=new URLSearchParams(window.location.search),tenant=params.get("tenant")||"demo",invoices=[],payments=[],feeTypes=[];
async function loadData(){var r=await Promise.all([fetch("/api/invoices?tenant="+tenant),fetch("/api/payments?tenant="+tenant),fetch("/api/fee-types?tenant="+tenant)]);invoices=await r[0].json();payments=await r[1].json();feeTypes=await r[2].json();}
function switchTab(tab){document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.remove("active");});document.querySelectorAll(".tab-content").forEach(function(c){c.classList.remove("active");});document.querySelector('[data-tab="'+tab+'"]').classList.add("active");document.getElementById("tab-"+tab).classList.add("active");if(tab==="dashboard")loadSummary();if(tab==="invoices")renderInvoices();if(tab==="fee-types")renderFeeTypes();if(tab==="payments")renderPayments();if(tab==="reports")resetReportForm();}
async function loadSummary(){var res=await fetch("/api/accounts/summary?tenant="+tenant),s=await res.json();document.getElementById("totalInvoiced").textContent="ZMW "+s.totalInvoiced.toFixed(2);document.getElementById("totalCollected").textContent="ZMW "+s.totalCollected.toFixed(2);document.getElementById("outstanding").textContent="ZMW "+s.outstanding.toFixed(2);document.getElementById("invoiceCount").textContent=s.invoiceCount;document.getElementById("paidInvoices").textContent=s.paidInvoices;document.getElementById("unpaidInvoices").textContent=s.unpaidInvoices;}
function renderInvoices(filter){filter=filter||{};var filtered=invoices.slice();if(filter.student)filtered=filtered.filter(function(inv){return inv.student_name.toLowerCase().indexOf(filter.student.toLowerCase())!==-1;});if(filter.status)filtered=filtered.filter(function(inv){return inv.status===filter.status;});var tbody=document.querySelector("#invoicesTable tbody");tbody.innerHTML=filtered.map(function(inv){return'<tr><td>'+inv.invoice_no+'</td><td>'+inv.student_name+'</td><td>'+new Date(inv.created_at).toLocaleDateString()+'</td><td>ZMW '+inv.amount.toFixed(2)+'</td><td><span class="status-badge status-'+inv.status+'">'+inv.status+'</span></td><td class="actions"><button class="btn-icon record-payment" data-id="'+inv.id+'"'+(inv.status==="Paid"?" disabled":"")+'>💳</button><button class="btn-icon view-invoice" data-id="'+inv.id+'">👁️</button></td></tr>';}).join("")||'<tr><td colspan="6">No invoices.</td></tr>';document.querySelectorAll(".record-payment").forEach(function(b){b.onclick=function(){openPaymentModal(b.dataset.id);};});document.querySelectorAll(".view-invoice").forEach(function(b){b.onclick=function(){viewInvoice(b.dataset.id);};});}
function openPaymentModal(invId){var inv=invoices.find(function(i){return i.id===invId;});if(!inv)return;document.getElementById("paymentInvoiceId").value=inv.id;document.getElementById("paymentInvoiceLabel").textContent="Invoice "+inv.invoice_no+" ("+inv.student_name+")";document.getElementById("paymentAmount").value=inv.amount;document.getElementById("paymentModal").style.display="block";}
function closePaymentModal(){document.getElementById("paymentModal").style.display="none";}
async function recordPayment(){var invId=document.getElementById("paymentInvoiceId").value,amount=parseFloat(document.getElementById("paymentAmount").value),method=document.getElementById("paymentMethod").value;var res=await fetch("/api/invoices/"+invId+"/pay?tenant="+tenant,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({amount:amount,method:method})});if(res.ok){closePaymentModal();loadData().then(function(){renderInvoices();});window.showNotification("Payment recorded!","success");}else alert("Error");}
function viewInvoice(id){var inv=invoices.find(function(i){return i.id===id;});if(!inv)return;document.getElementById("invoiceDetailContent").innerHTML='<h3>Invoice Details</h3><p>Invoice No: '+inv.invoice_no+'</p><p>Student: '+inv.student_name+'</p><p>Fee Type: '+(inv.fee_type_id||"N/A")+'</p><p>Amount: ZMW '+inv.amount.toFixed(2)+'</p><p>Status: '+inv.status+'</p><p>Date: '+new Date(inv.created_at).toLocaleDateString()+"</p>";document.getElementById("invoiceDetailModal").style.display="block";}
function closeInvoiceDetail(){document.getElementById("invoiceDetailModal").style.display="none";}
function renderFeeTypes(){var tbody=document.querySelector("#feeTypesTable tbody");tbody.innerHTML=feeTypes.map(function(ft){return'<tr><td>'+ft.name+'</td><td>'+(ft.description||"-")+'</td><td>ZMW '+ft.default_amount.toFixed(2)+'</td><td>'+(ft.mandatory?"Yes":"No")+'</td><td class="actions"><button class="btn-icon edit-feetype" data-id="'+ft.id+'">✏️</button><button class="btn-icon delete-feetype" data-id="'+ft.id+'">🗑️</button></td></tr>';}).join("");document.querySelectorAll(".edit-feetype").forEach(function(b){b.onclick=function(){editFeeType(b.dataset.id);};});document.querySelectorAll(".delete-feetype").forEach(function(b){b.onclick=function(){deleteFeeType(b.dataset.id);};});}
function openFeeTypeModal(ft){if(ft){document.getElementById("feeTypeId").value=ft.id;document.getElementById("feeTypeName").value=ft.name;document.getElementById("feeTypeDesc").value=ft.description||"";document.getElementById("feeTypeAmount").value=ft.default_amount;document.getElementById("feeTypeMandatory").checked=ft.mandatory;}else{document.getElementById("feeTypeForm").reset();document.getElementById("feeTypeId").value="";}document.getElementById("feeTypeModal").style.display="block";}
function closeFeeTypeModal(){document.getElementById("feeTypeModal").style.display="none";}
async function saveFeeType(e){e.preventDefault();var id=document.getElementById("feeTypeId").value,data={name:document.getElementById("feeTypeName").value,description:document.getElementById("feeTypeDesc").value,default_amount:parseFloat(document.getElementById("feeTypeAmount").value),mandatory:document.getElementById("feeTypeMandatory").checked};var url=id?"/api/fee-types/"+id+"?tenant="+tenant:"/api/fee-types?tenant="+tenant,method=id?"PUT":"POST";var res=await fetch(url,{method:method,headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});if(res.ok){closeFeeTypeModal();loadData().then(function(){renderFeeTypes();});window.showNotification("Fee type saved!","success");}else alert("Error");}
function editFeeType(id){var ft=feeTypes.find(function(f){return f.id===id;});if(ft)openFeeTypeModal(ft);}
async function deleteFeeType(id){if(!confirm("Delete?"))return;await fetch("/api/fee-types/"+id+"?tenant="+tenant,{method:"DELETE"});loadData().then(function(){renderFeeTypes();});}
function renderPayments(){var tbody=document.querySelector("#paymentsTable tbody");tbody.innerHTML=payments.map(function(p){return'<tr><td>'+new Date(p.date).toLocaleDateString()+'</td><td>'+p.invoice_no+'</td><td>'+p.student_name+'</td><td>ZMW '+p.amount.toFixed(2)+'</td><td>'+(p.method||"Cash")+"</td></tr>";}).join("")||'<tr><td colspan="5">No payments.</td></tr>';}
function resetReportForm(){document.getElementById("reportType").value="fee-collection";document.getElementById("reportStartDate").value="";document.getElementById("reportEndDate").value="";document.getElementById("reportOutput").innerHTML="";}
function generateReport(){var type=document.getElementById("reportType").value,start=document.getElementById("reportStartDate").value,end=document.getElementById("reportEndDate").value,html="",filtered;if(type==="fee-collection"){filtered=payments.filter(function(p){return(!start||p.date>=start)&&(!end||p.date<=end);});var total=filtered.reduce(function(s,p){return s+p.amount;},0);html='<h3>Fee Collection Report ('+(start||"all")+" – "+(end||"all")+')</h3><p>Total: ZMW '+total.toFixed(2)+'</p><table class="data-table"><thead><tr><th>Date</th><th>Invoice</th><th>Student</th><th>Amount</th></tr></thead><tbody>'+filtered.map(function(p){return'<tr><td>'+p.date+'</td><td>'+p.invoice_no+'</td><td>'+p.student_name+'</td><td>ZMW '+p.amount.toFixed(2)+"</td></tr>";}).join("")+"</tbody></table>";}else if(type==="outstanding"){filtered=invoices.filter(function(inv){return inv.status==="Unpaid";});var total=filtered.reduce(function(s,inv){return s+inv.amount;},0);html='<h3>Outstanding Balances</h3><p>Total: ZMW '+total.toFixed(2)+'</p><table class="data-table"><thead><tr><th>Invoice No</th><th>Student</th><th>Amount</th></tr></thead><tbody>'+filtered.map(function(inv){return'<tr><td>'+inv.invoice_no+'</td><td>'+inv.student_name+'</td><td>ZMW '+inv.amount.toFixed(2)+"</td></tr>";}).join("")+"</tbody></table>";}else if(type==="income-statement"){var feeTypeMap={};feeTypes.forEach(function(ft){feeTypeMap[ft.id]={name:ft.name,total:0};});payments.forEach(function(p){var inv=invoices.find(function(i){return i.id===p.invoice_id;});if(inv&&feeTypeMap[inv.fee_type_id])feeTypeMap[inv.fee_type_id].total+=p.amount;});html='<h3>Income Statement</h3><table class="data-table"><thead><tr><th>Fee Type</th><th>Total Collected</th></tr></thead><tbody>'+Object.values(feeTypeMap).map(function(ft){return'<tr><td>'+ft.name+'</td><td>ZMW '+ft.total.toFixed(2)+"</td></tr>";}).join("")+"</tbody></table>";}document.getElementById("reportOutput").innerHTML=html;document.getElementById("reportPrintBtn").style.display="inline-block";}
function printReport(){var content=document.getElementById("reportOutput").innerHTML;document.getElementById("report-print-area").innerHTML='<h2>Bwanali School – Financial Report</h2>'+content;window.print();}
document.addEventListener("DOMContentLoaded",async function(){
document.getElementById("page-content").innerHTML='<div class="module-header"><h2>💰 Accounts & Finance</h2></div><div class="tab-nav"><button class="tab-btn active" data-tab="dashboard" onclick="switchTab(\'dashboard\')">Dashboard</button><button class="tab-btn" data-tab="invoices" onclick="switchTab(\'invoices\')">Invoices</button><button class="tab-btn" data-tab="fee-types" onclick="switchTab(\'fee-types\')">Fee Types</button><button class="tab-btn" data-tab="payments" onclick="switchTab(\'payments\')">Payments</button><button class="tab-btn" data-tab="reports" onclick="switchTab(\'reports\')">📊 Reports</button></div><div id="tab-dashboard" class="tab-content active"><div class="stat-grid"><div class="stat-card"><h3>Total Invoiced</h3><div class="value" id="totalInvoiced">-</div></div><div class="stat-card"><h3>Total Collected</h3><div class="value" id="totalCollected">-</div></div><div class="stat-card"><h3>Outstanding</h3><div class="value" id="outstanding">-</div></div><div class="stat-card"><h3>Invoices</h3><div class="value" id="invoiceCount">-</div><small><span id="paidInvoices">0</span> paid / <span id="unpaidInvoices">0</span> unpaid</small></div></div></div><div id="tab-invoices" class="tab-content"><div class="filter-row"><input type="text" id="studentFilter" placeholder="Search student..."><select id="statusFilter"><option value="">All Status</option><option value="Paid">Paid</option><option value="Unpaid">Unpaid</option></select><button class="btn-primary" onclick="renderInvoices({student:document.getElementById(\'studentFilter\').value,status:document.getElementById(\'statusFilter\').value})">Filter</button></div><div class="table-container"><table class="data-table" id="invoicesTable"><thead><tr><th>Invoice No</th><th>Student</th><th>Date</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead><tbody></tbody></table></div></div><div id="tab-fee-types" class="tab-content"><button class="btn-primary" onclick="openFeeTypeModal()" style="margin-bottom:15px;">+ Add Fee Type</button><div class="table-container"><table class="data-table" id="feeTypesTable"><thead><tr><th>Name</th><th>Description</th><th>Default Amount</th><th>Mandatory</th><th>Actions</th></tr></thead><tbody></tbody></table></div></div><div id="tab-payments" class="tab-content"><div class="table-container"><table class="data-table" id="paymentsTable"><thead><tr><th>Date</th><th>Invoice</th><th>Student</th><th>Amount</th><th>Method</th></tr></thead><tbody></tbody></table></div></div><div id="tab-reports" class="tab-content"><div class="filter-row"><select id="reportType"><option value="fee-collection">Fee Collection</option><option value="outstanding">Outstanding Balances</option><option value="income-statement">Income Statement</option></select><input type="date" id="reportStartDate"><input type="date" id="reportEndDate"><button class="btn-primary" onclick="generateReport()">Generate Report</button><button class="btn-secondary no-print" id="reportPrintBtn" style="display:none;" onclick="printReport()">🖨️ Print Report</button></div><div id="reportOutput"></div><div id="report-print-area"></div></div><div class="modal" id="paymentModal"><div class="modal-overlay" onclick="closePaymentModal()"></div><div class="modal-content" style="max-width:400px;"><span class="modal-close" onclick="closePaymentModal()">&times;</span><h3>Record Payment</h3><p id="paymentInvoiceLabel"></p><form onsubmit="event.preventDefault();recordPayment();"><input type="hidden" id="paymentInvoiceId"><div class="form-group"><label>Amount</label><input type="number" id="paymentAmount" required></div><div class="form-group"><label>Method</label><select id="paymentMethod"><option>Cash</option><option>Bank Transfer</option><option>Mobile Money</option></select></div><button type="submit" class="btn-primary">Record Payment</button></form></div></div><div class="modal" id="invoiceDetailModal"><div class="modal-overlay" onclick="closeInvoiceDetail()"></div><div class="modal-content" style="max-width:500px;"><span class="modal-close" onclick="closeInvoiceDetail()">&times;</span><div id="invoiceDetailContent"></div></div></div><div class="modal" id="feeTypeModal"><div class="modal-overlay" onclick="closeFeeTypeModal()"></div><div class="modal-content" style="max-width:500px;"><span class="modal-close" onclick="closeFeeTypeModal()">&times;</span><h3>Fee Type</h3><form id="feeTypeForm" onsubmit="saveFeeType(event)"><input type="hidden" id="feeTypeId"><div class="form-group"><label>Name</label><input type="text" id="feeTypeName" required></div><div class="form-group"><label>Description</label><input type="text" id="feeTypeDesc"></div><div class="form-group"><label>Default Amount</label><input type="number" id="feeTypeAmount" required></div><div class="form-group"><label><input type="checkbox" id="feeTypeMandatory"> Mandatory</label></div><button type="submit" class="btn-primary">Save</button></form></div></div>';
await loadData();loadSummary();renderInvoices();renderFeeTypes();renderPayments();window.switchTab=switchTab;window.renderInvoices=renderInvoices;window.openFeeTypeModal=openFeeTypeModal;window.editFeeType=editFeeType;window.deleteFeeType=deleteFeeType;window.openPaymentModal=openPaymentModal;window.closePaymentModal=closePaymentModal;window.recordPayment=recordPayment;window.viewInvoice=viewInvoice;window.generateReport=generateReport;window.printReport=printReport;
});
</script></body></html>
