<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Pay Fees – Bwanali</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .payment-container { max-width: 700px; margin: 0 auto; }
    .fee-list { margin: 20px 0; }
    .fee-item { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; padding: 10px; background: #f8f9fa; border-radius: 8px; }
    .fee-item label { font-weight: 600; min-width: 150px; }
    .fee-item input[type="number"] { width: 100px; padding: 6px; }
    .fee-item input[type="checkbox"] { transform: scale(1.3); }
    .student-info { background: #f0f4ff; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
    .btn-primary, .btn-secondary { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
    .btn-primary { background: #1e3c72; color: white; }
    .btn-secondary { background: #ccc; color: #333; margin-left: 10px; }
    .total-row { font-size: 1.2rem; font-weight: 700; margin-top: 20px; }
  </style>
</head>
<body data-page="pay-fees-select">
<script src="/shared.js"></script>
<div id="page-content"></div>

<script>
document.addEventListener("DOMContentLoaded", async function() {
  const params = new URLSearchParams(window.location.search);
  const tenant = params.get('tenant') || 'demo';
  const studentId = params.get('studentId') || '';

  const content = document.getElementById('page-content');
  const token = sessionStorage.getItem('bwanali_token');

  if (!token) {
    content.innerHTML = '<p style="color:red;">You must be logged in. <a href="/login.html">Login</a></p>';
    return;
  }

  if (!studentId) {
    content.innerHTML = '<p>No student selected. <a href="/dashboard.html?tenant='+tenant+'">Go back</a></p>';
    return;
  }

  // Fetch student info and fee types in parallel
  const [studRes, feeRes] = await Promise.all([
    fetch(`/api/enrollments/${studentId}?tenant=${tenant}`),
    fetch(`/api/fee-types?tenant=${tenant}`)
  ]);

  if (studRes.status === 401) { alert('Session expired.'); window.location.href='/login.html'; return; }
  if (!studRes.ok) { content.innerHTML = '<p>Student not found.</p>'; return; }

  const student = await studRes.json();
  let feeTypes = [];
  if (feeRes.ok) {
    const data = await feeRes.json();
    feeTypes = data.data || data;
    if (!Array.isArray(feeTypes)) feeTypes = [];
  }

  // Build UI
  let feeItemsHTML = '';
  if (feeTypes.length === 0) {
    feeItemsHTML = '<p>No fee types configured. <a href="/dashboard.html?tenant='+tenant+'">Return to dashboard</a></p>';
  } else {
    feeTypes.forEach(ft => {
      feeItemsHTML += `
        <div class="fee-item">
          <input type="checkbox" class="fee-check" value="${ft.id}" data-amount="${ft.default_amount || 0}" id="fee_${ft.id}">
          <label for="fee_${ft.id}">${ft.name} ${ft.description ? '('+ft.description+')' : ''}</label>
          <span>Amount (K):</span>
          <input type="number" class="fee-amount" value="${ft.default_amount || 0}" min="0" step="any" data-id="${ft.id}" disabled>
        </div>`;
    });
  }

  let html = `
    <div class="module-header"><h2>Select Fees to Pay</h2></div>
    <div class="payment-container">
      <div class="student-info">
        <h3>${student.first_name} ${student.last_name}</h3>
        <p><strong>Admission No:</strong> ${student.admission_no} | <strong>Class:</strong> ${student.class || '-'} ${student.section ? '('+student.section+')' : ''}</p>
      </div>
      <div class="fee-list">
        <h3>Available Fees</h3>
        ${feeItemsHTML}
      </div>
      <div class="total-row">Total: K <span id="totalAmount">0.00</span></div>
      <div style="margin-top:20px;">
        <label>Payment Method:</label>
        <select id="paymentMethod" style="width:auto; margin-left:10px;">
          <option value="Cash">Cash</option>
          <option value="Bank Transfer">Bank Transfer</option>
          <option value="Mobile Money">Mobile Money</option>
          <option value="Cheque">Cheque</option>
        </select>
        <label style="margin-left:40px;">Remarks:</label>
        <input type="text" id="paymentRemarks" placeholder="Optional note" style="width:200px; margin-left:10px;">
      </div>
      <div style="margin-top:25px;">
        <button class="btn-primary" id="processPaymentBtn">💳 Pay Selected Fees</button>
        <button class="btn-secondary" onclick="window.location.href='/pages/student.html?tenant=${tenant}&id=${studentId}'">Cancel</button>
      </div>
    </div>
  `;

  content.innerHTML = html;

  // Enable/disable amount inputs based on checkbox
  const checkboxes = document.querySelectorAll('.fee-check');
  const amountInputs = document.querySelectorAll('.fee-amount');
  const totalSpan = document.getElementById('totalAmount');

  function updateTotal() {
    let total = 0;
    checkboxes.forEach((cb, i) => {
      if (cb.checked) {
        total += parseFloat(amountInputs[i].value) || 0;
      }
    });
    totalSpan.textContent = total.toFixed(2);
  }

  checkboxes.forEach((cb, index) => {
    cb.addEventListener('change', () => {
      amountInputs[index].disabled = !cb.checked;
      updateTotal();
    });
  });

  amountInputs.forEach(input => {
    input.addEventListener('input', updateTotal);
  });

  // Process Payment button
  document.getElementById('processPaymentBtn').addEventListener('click', async () => {
    const selectedItems = [];
    checkboxes.forEach((cb, i) => {
      if (cb.checked) {
        selectedItems.push({
          fee_type_id: cb.value,
          description: cb.parentElement.querySelector('label').textContent.trim(),
          amount: parseFloat(amountInputs[i].value) || 0
        });
      }
    });

    if (selectedItems.length === 0) {
      alert('Please select at least one fee item.');
      return;
    }

    const total = selectedItems.reduce((s, i) => s + i.amount, 0);
    if (total <= 0) {
      alert('Total amount must be greater than zero.');
      return;
    }

    const method = document.getElementById('paymentMethod').value;
    const remarks = document.getElementById('paymentRemarks').value;

    try {
      const res = await fetch(`/api/invoices/generate-with-items?tenant=${tenant}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          student_id: studentId,
          items: selectedItems,
          payment_method: method,
          remarks
        })
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Payment failed');
      }
      const result = await res.json();
      alert('Payment processed successfully! Receipt: ' + (result.payment.receipt_number || 'N/A'));
      window.location.href = `/pages/student.html?tenant=${tenant}&id=${studentId}`;
    } catch(e) {
      alert('Error: ' + e.message);
    }
  });
});
</script>
</body>
</html>
