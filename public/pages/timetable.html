<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Timetable – Bwanali</title><link rel="stylesheet" href="/style.css"><style>.class-alloc{border:1px solid #ddd;padding:10px;margin-bottom:10px;border-radius:8px;}.subject-row{display:flex;gap:10px;align-items:center;margin-bottom:5px;}.day-table{width:100%;border-collapse:collapse;margin-top:15px;}.day-table th,.day-table td{border:1px solid #ddd;padding:8px;text-align:center;}.day-table th{background:#1e3c72;color:#fff;}@media print{body *{visibility:hidden;}#printable-timetable,#printable-timetable *{visibility:visible;}#printable-timetable{position:absolute;top:0;left:0;width:100%;padding:20px;}}</style></head><body data-page="timetable"><script src="/shared.js"></script><script>
var params=new URLSearchParams(window.location.search),tenant=params.get("tenant")||"demo",staff=[],schoolTimetable={},DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday"],PERIODS=8;
async function loadStaff(){try{var res=await fetch("/api/staff?tenant="+tenant);staff=await res.json();populateTeacherDropdowns();}catch(e){window.showNotification("Failed to load staff: "+e.message,"error");}}
function populateTeacherDropdowns(){document.querySelectorAll(".subject-teacher").forEach(function(select){select.innerHTML='<option value="">-- Teacher --</option>'+staff.map(function(s){return'<option value="'+s.id+'">'+s.first_name+" "+s.last_name+"</option>";}).join("");});}
function addClassBlock(className){var container=document.getElementById("classAllocations");var div=document.createElement("div");div.className="class-alloc";div.innerHTML='<h4><input type="text" class="class-name-input" placeholder="Class name" value="'+(className||"")+'"><button type="button" class="remove-class">🗑️</button></h4><div class="subjects-list"></div><button type="button" class="add-subject-btn">+ Add Subject</button>';container.appendChild(div);div.querySelector(".remove-class").addEventListener("click",function(){div.remove();});div.querySelector(".add-subject-btn").addEventListener("click",function(){addSubjectRow(div);});addSubjectRow(div);populateTeacherDropdowns();}
function addSubjectRow(classDiv){var list=classDiv.querySelector(".subjects-list");var row=document.createElement("div");row.className="subject-row";row.innerHTML='<input type="text" class="subject-name" placeholder="Subject"><select class="subject-teacher"><option value="">-- Teacher --</option></select><input type="number" class="periods-count" placeholder="Periods/week" min="1" max="40" value="1"><button type="button" class="remove-subject">🗑️</button>';list.appendChild(row);populateTeacherDropdowns();row.querySelector(".remove-subject").addEventListener("click",function(){row.remove();});}
function getAllAllocations(){var result=[];document.querySelectorAll(".class-alloc").forEach(function(div){var className=div.querySelector(".class-name-input").value.trim();var subjects=[];div.querySelectorAll(".subject-row").forEach(function(row){var name=row.querySelector(".subject-name").value.trim(),teacher=row.querySelector(".subject-teacher").value,periods=parseInt(row.querySelector(".periods-count").value)||0;if(name&&teacher&&periods>0)subjects.push({subject:name,teacher_id:teacher,periods:periods});});if(className)result.push({className:className,subjects:subjects});});return result;}
function generateSchoolTimetable(){var allocations=getAllAllocations();if(!allocations.length)return window.showNotification("Add classes and subjects.","error");var teacherSlots={};staff.forEach(function(s){teacherSlots[s.id]={};});DAYS.forEach(function(day){for(var id in teacherSlots)teacherSlots[id][day]=new Set();});var timetable={};allocations.forEach(function(cls){timetable[cls.className]=[];});var sorted=allocations.slice().sort(function(a,b){var totalA=a.subjects.reduce(function(s,sub){return s+sub.periods;},0),totalB=b.subjects.reduce(function(s,sub){return s+sub.periods;},0);return totalB-totalA;});for(var ci=0;ci<sorted.length;ci++){var cls=sorted[ci];for(var si=0;si<cls.subjects.length;si++){var subj=cls.subjects[si];for(var i=0;i<subj.periods;i++){var placed=false;for(var di=0;di<DAYS.length;di++){var day=DAYS[di];for(var p=1;p<=PERIODS;p++){if(!teacherSlots[subj.teacher_id][day].has(p)){teacherSlots[subj.teacher_id][day].add(p);timetable[cls.className].push({day:day,period:p,subject:subj.subject,teacher_id:subj.teacher_id});placed=true;break;}}if(placed)break;}if(!placed){window.showNotification("Could not place all periods for "+subj.subject+" in "+cls.className+".","error");return;}}}}schoolTimetable=timetable;renderDayView();document.getElementById("daySelector").style.display="block";}
function renderDayView(){var selectedDay=document.getElementById("daySelectorSelect").value;if(!selectedDay)return;var startTime=document.getElementById("startTime").value,periodDuration=parseInt(document.getElementById("periodDuration").value)||40,timeSlots=[];if(startTime){var h=parseInt(startTime.split(":")[0]),m=parseInt(startTime.split(":")[1]);for(var p=0;p<PERIODS;p++){var start=new Date(0,0,0,h,m),end=new Date(start.getTime()+periodDuration*60000);timeSlots.push(start.toTimeString().substr(0,5)+"-"+end.toTimeString().substr(0,5));h=end.getHours();m=end.getMinutes();}}else{for(var p=1;p<=PERIODS;p++)timeSlots.push("Period "+p);}var classList=Object.keys(schoolTimetable);if(!classList.length){document.getElementById("timetableDisplay").innerHTML="<p>No timetable.</p>";return;}var html='<table class="day-table"><thead><tr><th>Time</th>';classList.forEach(function(cls){html+="<th>"+cls+"</th>";});html+="</tr></thead><tbody>";for(var p=1;p<=PERIODS;p++){html+="<tr><td>"+timeSlots[p-1]+"</td>";classList.forEach(function(cls){var entry=(schoolTimetable[cls]||[]).find(function(e){return e.day===selectedDay&&e.period==p;});var subj=entry?entry.subject:"",teacher=entry?staff.find(function(s){return s.id===entry.teacher_id}):null;html+="<td>"+(subj||"-")+(teacher?"<br><small>"+teacher.first_name+" "+teacher.last_name+"</small>":"")+"</td>";});html+="</tr>";}html+="</tbody></table>";document.getElementById("timetableDisplay").innerHTML=html;}
async function saveSchoolTimetable(){var term=document.getElementById("selectTerm").value,entries=[];for(var cls in schoolTimetable){schoolTimetable[cls].forEach(function(e){entries.push({class_name:cls,day:e.day,period:e.period,subject:e.subject,teacher_id:e.teacher_id});});}var res=await fetch("/api/timetables/school?tenant="+tenant,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({term:term,entries:entries})});if(res.ok)window.showNotification("Timetable saved!","success");else window.showNotification("Error saving timetable","error");}
function printTimetable(){var selectedDay=document.getElementById("daySelectorSelect").value,term=document.getElementById("selectTerm").value,content=document.getElementById("timetableDisplay").innerHTML;document.getElementById("printable-timetable").innerHTML='<h2>Timetable – '+term+"</h2><h3>"+selectedDay+"</h3>"+content;window.print();}
document.addEventListener("DOMContentLoaded",async function(){
document.getElementById("page-content").innerHTML='<div class="module-header"><h2>Timetable Generator</h2></div><div class="card" style="background:#fff;padding:20px;border-radius:10px;margin-bottom:20px;"><h3>Settings</h3><div class="form-row"><div class="form-group"><label>Start Time</label><input type="time" id="startTime" value="08:00"></div><div class="form-group"><label>Period Duration (min)</label><input type="number" id="periodDuration" value="40" min="30" max="90"></div><div class="form-group"><label>Term</label><select id="selectTerm"><option>Term 1</option><option>Term 2</option><option>Term 3</option></select></div></div></div><div class="card" style="background:#fff;padding:20px;border-radius:10px;margin-bottom:20px;"><h3>Subject Allocations</h3><div id="classAllocations"></div><button type="button" class="btn-secondary" id="addClassBtn">+ Add Class</button></div><div class="form-actions" style="margin-bottom:20px;"><button type="button" class="btn-primary" id="generateBtn">Generate Timetable</button><button type="button" class="btn-primary" id="saveBtn">Save</button><button type="button" class="btn-secondary" id="printBtn">🖨️ Print</button></div><div class="card" id="daySelector" style="display:none; background:#fff;padding:20px;border-radius:10px;margin-bottom:20px;"><label>Select Day:</label><select id="daySelectorSelect" onchange="renderDayView()"><option value="Monday">Monday</option><option value="Tuesday">Tuesday</option><option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option><option value="Friday">Friday</option></select></div><div id="timetableDisplay"></div><div id="printable-timetable"></div>';
await loadStaff();addClassBlock();document.getElementById("addClassBtn").addEventListener("click",function(){addClassBlock();});document.getElementById("generateBtn").addEventListener("click",generateSchoolTimetable);document.getElementById("saveBtn").addEventListener("click",saveSchoolTimetable);document.getElementById("printBtn").addEventListener("click",printTimetable);
});
</script></body></html>
