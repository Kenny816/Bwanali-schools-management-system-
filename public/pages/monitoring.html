<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Monitoring – Bwanali</title><link rel="stylesheet" href="/style.css"><style>.score-select{width:70px;}.criteria-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}.criteria-label{flex:2;font-weight:500;}.score-group{flex:1;display:flex;gap:5px;align-items:center;}@media print{body *{visibility:hidden;}#printable-report,#printable-report *{visibility:visible;}#printable-report{position:absolute;top:0;left:0;width:100%;padding:20px;}.no-print{display:none!important;}}</style></head><body data-page="monitoring"><script src="/shared.js"></script><script>
var params=new URLSearchParams(window.location.search),tenant=params.get("tenant")||"demo",monitoringRecords=[],staff=[],classes=[];
var CRITERIA=[{key:"dressCode",label:"Dress Code"},{key:"languageUse",label:"Language Use"},{key:"useOfTeachingAids",label:"Use of Teaching Aids"},{key:"lessonIntro",label:"Lesson Introduction"},{key:"classCoordination",label:"Class Coordination"},{key:"pupilParticipation",label:"Pupil Participation"},{key:"lessonDevelopment",label:"Lesson Development"},{key:"conclusion",label:"Conclusion"},{key:"markingBooks",label:"Marking of Books"},{key:"timeManagement",label:"Time Management"},{key:"contentKnowledge",label:"Content Knowledge"},{key:"fileOrganization",label:"File Organization"},{key:"fileContent",label:"File Content (IWP, Lesson Plans, Records of Work, Homework Policy)"}];
async function loadData(){var r=await Promise.all([fetch("/api/monitoring?tenant="+tenant),fetch("/api/staff?tenant="+tenant),fetch("/api/classes?tenant="+tenant)]);monitoringRecords=await r[0].json();staff=await r[1].json();classes=await r[2].json();populateDropdowns();renderMonitoringTable();}
function populateDropdowns(){var ts=document.getElementById("monitorTeacher");if(ts){ts.innerHTML='<option value="">-- Select Teacher --</option>';staff.filter(function(s){return s.role==="Teacher";}).forEach(function(t){ts.innerHTML+='<option value="'+t.id+'">'+t.first_name+" "+t.last_name+"</option>";});}var cs=document.getElementById("monitorClass");if(cs){cs.innerHTML='<option value="">-- Select Class --</option>';classes.forEach(function(c){cs.innerHTML+='<option value="'+c.id+'">'+c.name+(c.section?" ("+c.section+")":"")+"</option>";});}}
function calculatePercentage(){var total=0,count=0;CRITERIA.forEach(function(c){var val=parseInt(document.getElementById("score_"+c.key).value);if(!isNaN(val)){total+=val;count++;}});var max=count*5,percent=max>0?Math.round((total/max)*100):0;document.getElementById("totalPercent").textContent=percent+"%";return{total:total,max:max,percent:percent};}
function renderMonitoringTable(){var tbody=document.querySelector("#monitoringTable tbody");tbody.innerHTML="";if(!monitoringRecords.length){tbody.innerHTML='<tr><td colspan="6" class="text-muted">No records.</td></tr>';return;}monitoringRecords.forEach(function(m){var row=document.createElement("tr");row.innerHTML='<td>'+m.date+'</td><td>'+m.teacher_name+'</td><td>'+m.class_name+'</td><td>'+(m.subject||"-")+'</td><td>'+m.percentage+'%</td><td class="actions"><button class="btn-icon view-monitoring" data-id="'+m.id+'">👁️</button></td>';tbody.appendChild(row);});document.querySelectorAll("#monitoringTable .view-monitoring").forEach(function(btn){btn.addEventListener("click",function(){previewMonitoring(btn.dataset.id);});});}
function previewMonitoring(id){var record=monitoringRecords.find(function(m){return m.id===id;});if(!record)return;var scores=record.scores||{};var criteriaHtml=CRITERIA.map(function(c){var score=scores[c.key]||0;return'<tr><td>'+c.label+'</td><td style="text-align:center;">'+(score||"-")+"</td></tr>";}).join("");var reportHtml='<h2 style="text-align:center;">Teacher Monitoring Report</h2><p><strong>Date:</strong> '+record.date+(record.time?" at "+record.time:"")+'</p><p><strong>Teacher:</strong> '+record.teacher_name+'</p><p><strong>Class:</strong> '+record.class_name+'</p><p><strong>Subject:</strong> '+(record.subject||"-")+'</p><hr><h4>Evaluation Criteria</h4><table class="data-table" style="width:100%;"><thead><tr><th>Criterion</th><th>Score (out of 5)</th></tr></thead><tbody>'+criteriaHtml+'</tbody></table><p style="text-align:right;font-weight:bold;margin-top:10px;">Overall: '+record.percentage+'%</p><div style="margin-top:15px;"><strong>Recommendations:</strong><p>'+(record.recommendations||"None")+'</p></div><p style="margin-top:20px;font-size:12px;">Generated on '+new Date().toLocaleDateString()+"</p>";document.getElementById("printable-report").innerHTML=reportHtml;document.getElementById("previewModal").style.display="block";}
function closePreview(){document.getElementById("previewModal").style.display="none";}
async function saveMonitoring(e){e.preventDefault();var scores={};CRITERIA.forEach(function(c){scores[c.key]=parseInt(document.getElementById("score_"+c.key).value)||0;});var calc=calculatePercentage();var data={date:document.getElementById("monitorDate").value,time:document.getElementById("monitorTime").value,teacher_id:document.getElementById("monitorTeacher").value,class_id:document.getElementById("monitorClass").value,subject:document.getElementById("monitorSubject").value,recommendations:document.getElementById("monitorRecommendations").value,scores:scores,total_score:calc.total,percentage:calc.percent};var res=await fetch("/api/monitoring?tenant="+tenant,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});if(res.ok){window.showNotification("Monitoring saved!","success");document.getElementById("monitoringForm").reset();document.getElementById("totalPercent").textContent="0%";loadData();}else{var err=await res.json();window.showNotification(err.error||"Could not save","error");}}
document.addEventListener("DOMContentLoaded",async function(){
document.getElementById("page-content").innerHTML='<div class="module-header"><h2>Teacher Monitoring</h2></div><div class="card" style="background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05);margin-bottom:30px;"><h3>New Monitoring Session</h3><form id="monitoringForm"><div class="form-row"><div class="form-group"><label>Date *</label><input type="date" id="monitorDate" required></div><div class="form-group"><label>Time</label><input type="time" id="monitorTime"></div></div><div class="form-row"><div class="form-group"><label>Teacher *</label><select id="monitorTeacher" required><option value="">-- Select Teacher --</option></select></div><div class="form-group"><label>Class *</label><select id="monitorClass" required><option value="">-- Select Class --</option></select></div></div><div class="form-row"><div class="form-group"><label>Subject</label><input type="text" id="monitorSubject" placeholder="e.g., Mathematics"></div></div><h4 style="margin-top:20px;">Evaluation Criteria (1 = Poor, 5 = Excellent)</h4><div id="criteriaContainer"></div><div style="text-align:right;margin-top:10px;font-weight:bold;">Overall: <span id="totalPercent">0%</span></div><div class="form-group" style="margin-top:15px;"><label>Recommendations</label><textarea id="monitorRecommendations" rows="3" style="width:100%;" placeholder="Any recommendations..."></textarea></div><div class="form-actions"><button type="submit" class="btn-primary">Save Monitoring</button></div></form></div><h3>Previous Monitoring Records</h3><div class="table-container"><table class="data-table" id="monitoringTable"><thead><tr><th>Date</th><th>Teacher</th><th>Class</th><th>Subject</th><th>Score</th><th>Actions</th></tr></thead><tbody></tbody></table></div><div class="modal" id="previewModal"><div class="modal-overlay"></div><div class="modal-content" style="max-width:700px;"><span class="modal-close no-print" id="closePreviewBtn">&times;</span><div id="printable-report"></div><div class="form-actions no-print"><button class="btn-primary" onclick="window.print()">🖨️ Print / Download PDF</button><button class="btn-secondary" id="closePreviewBottomBtn">Close</button></div></div></div>';
var container=document.getElementById("criteriaContainer");CRITERIA.forEach(function(c){var div=document.createElement("div");div.className="criteria-row";div.innerHTML='<span class="criteria-label">'+c.label+'</span><div class="score-group"><select id="score_'+c.key+'" class="score-select" onchange="calculatePercentage()"><option value="">--</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select></div>';container.appendChild(div);});
await loadData();
document.getElementById("monitoringForm").addEventListener("submit",saveMonitoring);document.getElementById("closePreviewBtn").addEventListener("click",closePreview);document.getElementById("closePreviewBottomBtn").addEventListener("click",closePreview);document.querySelector("#previewModal .modal-overlay").addEventListener("click",closePreview);
});
</script></body></html>
