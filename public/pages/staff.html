<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Staff – Bwanali</title><link rel="stylesheet" href="/style.css"></head><body data-page="staff"><script src="/shared.js"></script><script>
var params=new URLSearchParams(window.location.search),tenant=params.get("tenant")||"demo",staff=[],classes=[];
async function loadData(){var r=await Promise.all([fetch("/api/staff?tenant="+tenant),fetch("/api/classes?tenant="+tenant)]);staff=await r[0].json();classes=await r[1].json();renderTable();}
function renderTable(){var tb=document.querySelector("#staffTable tbody");tb.innerHTML="";if(!staff.length){tb.innerHTML='<tr><td colspan="7">No staff.</td></tr>';return;}staff.forEach(function(s){var cls=classes.find(c=>c.teacher_id===s.id);var cn=cls?cls.name:"-";var row=document.createElement("tr");row.innerHTML='<td>'+s.first_name+" "+s.last_name+'</td><td>'+s.role+'</td><td>'+(s.subjects||"-")+'</td><td>'+cn+'</td><td>'+(s.phone||"-")+'</td><td>'+(s.email||"-")+'</td><td><button class="btn-icon edit-staff" data-id="'+s.id+'">✏️</button><button class="btn-icon delete-staff" data-id="'+s.id+'">🗑️</button></td>';tb.appendChild(row);});document.querySelectorAll(".edit-staff").forEach(b=>b.onclick=function(){editStaff(b.dataset.id);});document.querySelectorAll(".delete-staff").forEach(b=>b.onclick=function(){deleteStaff(b.dataset.id);});}
function openModal(s){var sel=document.getElementById("staffClass");sel.innerHTML='<option value="">-- None --</option>'+classes.map(c=>'<option value="'+c.id+'">'+c.name+'</option>').join("");if(s){document.getElementById("staffId").value=s.id;document.getElementById("firstName").value=s.first_name;document.getElementById("lastName").value=s.last_name;document.getElementById("role").value=s.role;document.getElementById("subjects").value=s.subjects||"";document.getElementById("phone").value=s.phone||"";document.getElementById("email").value=s.email||"";sel.value=classes.find(c=>c.teacher_id===s.id)?classes.find(c=>c.teacher_id===s.id).id:"";}else{document.getElementById("staffForm").reset();document.getElementById("staffId").value="";}document.getElementById("staffModal").style.display="block";}
function closeModal(){document.getElementById("staffModal").style.display="none";}
async function saveStaff(e){e.preventDefault();var id=document.getElementById("staffId").value,data={first_name:document.getElementById("firstName").value,last_name:document.getElementById("lastName").value,role:document.getElementById("role").value,subjects:document.getElementById("subjects").value,phone:document.getElementById("phone").value,email:document.getElementById("email").value};var url=id?"/api/staff/"+id+"?tenant="+tenant:"/api/staff?tenant="+tenant,method=id?"PUT":"POST";await fetch(url,{method:method,headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});closeModal();loadData();}
function editStaff(id){var s=staff.find(s=>s.id===id);if(s)openModal(s);}
function deleteStaff(id){if(confirm("Delete?")){fetch("/api/staff/"+id+"?tenant="+tenant,{method:"DELETE"}).then(loadData);}}
document.addEventListener("DOMContentLoaded",async function(){
document.getElementById("page-content").innerHTML='<div class="module-header"><h2>Staff Management</h2><button class="btn-primary" id="addStaffBtn">+ Add Staff</button></div><div class="modal" id="staffModal"><div class="modal-overlay"></div><div class="modal-content"><span class="modal-close" id="closeStaffModalBtn">&times;</span><h3>Add Staff</h3><form id="staffForm"><input type="hidden" id="staffId"><div class="form-row"><div class="form-group"><label>First Name</label><input type="text" id="firstName" required></div><div class="form-group"><label>Last Name</label><input type="text" id="lastName" required></div></div><div class="form-row"><div class="form-group"><label>Role</label><select id="role"><option>Teacher</option><option>Administrator</option></select></div><div class="form-group"><label>Subjects</label><input type="text" id="subjects"></div></div><div class="form-row"><div class="form-group"><label>Phone</label><input type="text" id="phone"></div><div class="form-group"><label>Email</label><input type="email" id="email"></div></div><div class="form-group"><label>Assign Class</label><select id="staffClass"></select></div><div class="form-actions"><button type="button" class="btn-secondary" id="cancelStaffBtn">Cancel</button><button type="submit" class="btn-primary">Save</button></div></form></div></div><div class="table-container"><table class="data-table" id="staffTable"><thead><tr><th>Name</th><th>Role</th><th>Subjects</th><th>Class</th><th>Phone</th><th>Email</th><th>Actions</th></tr></thead><tbody></tbody></table></div>';
await loadData();document.getElementById("addStaffBtn").addEventListener("click",()=>openModal());document.getElementById("closeStaffModalBtn").addEventListener("click",closeModal);document.getElementById("cancelStaffBtn").addEventListener("click",closeModal);document.querySelector("#staffModal .modal-overlay").addEventListener("click",closeModal);document.getElementById("staffForm").addEventListener("submit",saveStaff);
});
</script></body></html>
