<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Library – Bwanali</title><link rel="stylesheet" href="/style.css"><style>.tab-nav{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}.tab-btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;background:#ccc;color:#333;font-size:14px;}.tab-btn.active{background:#1e3c72;color:#fff;}.tab-content{display:none;}.tab-content.active{display:block;}#pastPaperFields{display:none;}</style></head><body data-page="library"><script src="/shared.js"></script><script>
var params=new URLSearchParams(window.location.search),tenant=params.get("tenant")||"demo",books=[],transactions=[];
async function loadData(){var r=await Promise.all([fetch("/api/library/books?tenant="+tenant),fetch("/api/library/transactions?tenant="+tenant),fetch("/api/library/stats?tenant="+tenant)]);books=await r[0].json();transactions=await r[1].json();var stats=await r[2].json();document.getElementById("totalItems").textContent=stats.totalItems;document.getElementById("borrowedItems").textContent=stats.borrowedItems;document.getElementById("overdueItems").textContent=stats.overdueItems;}
function switchTab(tab){document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.remove("active");});document.querySelectorAll(".tab-content").forEach(function(c){c.classList.remove("active");});document.querySelector('[data-tab="'+tab+'"]').classList.add("active");document.getElementById("tab-"+tab).classList.add("active");if(tab==="books")renderBooks();if(tab==="transactions")renderTransactions();}
function renderBooks(filter){filter=filter||"";var filtered=books;if(filter){var q=filter.toLowerCase();filtered=books.filter(function(b){return b.title.toLowerCase().indexOf(q)!==-1||(b.author||"").toLowerCase().indexOf(q)!==-1||(b.isbn||"").indexOf(q)!==-1;});}var tbody=document.querySelector("#booksTable tbody");tbody.innerHTML=filtered.map(function(b){var extraInfo=[];if(b.item_type==="past_paper"){if(b.subject)extraInfo.push("Subject: "+b.subject);if(b.year)extraInfo.push("Year: "+b.year);if(b.exam_type)extraInfo.push("Exam: "+b.exam_type);}var extraStr=extraInfo.length?"<br><small>"+extraInfo.join(" | ")+"</small>":"";var typeLabel=b.item_type?b.item_type.replace("_"," "):"book";return'<tr><td>'+b.title+extraStr+'</td><td>'+(b.author||"-")+'</td><td>'+typeLabel+'</td><td>'+(b.category||"-")+'</td><td>'+b.quantity+'</td><td>'+b.available+'</td><td class="actions"><button class="btn-icon edit-book" data-id="'+b.id+'">✏️</button><button class="btn-icon borrow-book" data-id="'+b.id+'"'+(b.available<=0?" disabled":"")+'>📚</button><button class="btn-icon delete-book" data-id="'+b.id+'">🗑️</button></td></tr>';}).join("")||'<tr><td colspan="7">No items.</td></tr>';document.querySelectorAll(".edit-book").forEach(function(btn){btn.onclick=function(){editBook(btn.dataset.id);};});document.querySelectorAll(".borrow-book").forEach(function(btn){btn.onclick=function(){openBorrowModal(btn.dataset.id);};});document.querySelectorAll(".delete-book").forEach(function(btn){btn.onclick=function(){deleteBook(btn.dataset.id);};});}
function openBookModal(item){document.getElementById("pastPaperFields").style.display="none";if(item){document.getElementById("bookId").value=item.id;document.getElementById("bookTitle").value=item.title;document.getElementById("bookAuthor").value=item.author||"";document.getElementById("bookISBN").value=item.isbn||"";document.getElementById("bookCategory").value=item.category||"General";document.getElementById("bookQuantity").value=item.quantity;document.getElementById("itemType").value=item.item_type||"book";document.getElementById("pastSubject").value=item.subject||"";document.getElementById("pastYear").value=item.year||"";document.getElementById("pastExamType").value=item.exam_type||"";document.getElementById("bookModalTitle").textContent="Edit Item";}else{document.getElementById("bookForm").reset();document.getElementById("bookId").value="";document.getElementById("bookModalTitle").textContent="Add Item";}togglePastPaperFields();document.getElementById("bookModal").style.display="block";}
function togglePastPaperFields(){document.getElementById("pastPaperFields").style.display=document.getElementById("itemType").value==="past_paper"?"block":"none";}
function closeBookModal(){document.getElementById("bookModal").style.display="none";}
async function saveBook(e){e.preventDefault();var id=document.getElementById("bookId").value,data={title:document.getElementById("bookTitle").value,author:document.getElementById("bookAuthor").value,isbn:document.getElementById("bookISBN").value,category:document.getElementById("bookCategory").value,item_type:document.getElementById("itemType").value,quantity:parseInt(document.getElementById("bookQuantity").value)||1,subject:document.getElementById("pastSubject").value,year:document.getElementById("pastYear").value,exam_type:document.getElementById("pastExamType").value};var url=id?"/api/library/books/"+id+"?tenant="+tenant:"/api/library/books?tenant="+tenant,method=id?"PUT":"POST";var res=await fetch(url,{method:method,headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});if(res.ok){closeBookModal();loadData().then(function(){renderBooks();});window.showNotification("Item saved!","success");}else{var err=await res.json();window.showNotification(err.error||"Could not save","error");}}
function editBook(id){var b=books.find(function(b){return b.id===id;});if(b)openBookModal(b);}
async function deleteBook(id){if(!confirm("Delete?"))return;await fetch("/api/library/books/"+id+"?tenant="+tenant,{method:"DELETE"});loadData().then(function(){renderBooks();});}
function openBorrowModal(bookId){var book=books.find(function(b){return b.id===bookId;});if(!book)return;document.getElementById("borrowBookId").value=bookId;document.getElementById("borrowBookTitle").textContent=book.title;document.getElementById("borrowModal").style.display="block";}
function closeBorrowModal(){document.getElementById("borrowModal").style.display="none";}
async function borrowBook(e){e.preventDefault();var bookId=document.getElementById("borrowBookId").value,data={book_id:bookId,borrower_id:document.getElementById("borrowerId").value,borrower_name:document.getElementById("borrowerName").value,borrower_type:document.getElementById("borrowerType").value};var res=await fetch("/api/library/borrow?tenant="+tenant,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});if(res.ok){closeBorrowModal();loadData().then(function(){renderBooks();});window.showNotification("Borrowed!","success");}else{var err=await res.json();window.showNotification(err.error||"Could not borrow","error");}}
async function renderTransactions(){var res=await fetch("/api/library/transactions?tenant="+tenant);transactions=await res.json();var tbody=document.querySelector("#transactionsTable tbody");tbody.innerHTML=transactions.map(function(t){var isOverdue=t.status==="borrowed"&&new Date(t.due_date)<new Date();var overdueLabel=isOverdue?" ⚠️ Overdue":"";return'<tr><td>'+t.book_title+'</td><td>'+t.borrower_name+'</td><td>'+t.borrow_date+'</td><td>'+t.due_date+overdueLabel+'</td><td>'+(t.return_date||"-")+'</td><td>'+t.status+'</td><td class="actions">'+(t.status==="borrowed"?'<button class="btn-icon return-book" data-id="'+t.id+'">📥 Return</button>':"")+"</td></tr>";}).join("")||'<tr><td colspan="7">No transactions.</td></tr>';document.querySelectorAll(".return-book").forEach(function(btn){btn.onclick=function(){returnBook(btn.dataset.id);};});}
async function returnBook(id){if(!confirm("Return?"))return;var res=await fetch("/api/library/return/"+id+"?tenant="+tenant,{method:"PUT"});if(res.ok){var txn=await res.json();if(txn.overdue){var dueDate=new Date(txn.due_date),returnDate=new Date(txn.return_date),daysLate=Math.ceil((returnDate-dueDate)/(1000*60*60*24));alert("⚠️ This item is "+daysLate+" day(s) overdue! Please remind the borrower.");}loadData().then(function(){renderTransactions();renderBooks();});}else{var err=await res.json();window.showNotification(err.error||"Could not return","error");}}
async function showOverdueAlert(){var res=await fetch("/api/library/overdue?tenant="+tenant);var overdue=await res.json();if(overdue.length===0){alert("No overdue items. ✅");return;}var message="⚠️ OVERDUE ITEMS:\n\n";overdue.forEach(function(t){message+="• "+t.book_title+" – borrowed by "+t.borrower_name+" (Due: "+t.due_date+", "+t.days_overdue+" days late)\n";});alert(message);}
document.addEventListener("DOMContentLoaded",async function(){
document.getElementById("page-content").innerHTML='<div class="module-header"><h2>📚 Library Management</h2><button class="btn-secondary" onclick="showOverdueAlert()">⚠️ Overdue Alert</button></div><div class="stat-grid"><div class="stat-card"><h3>Total Items</h3><div class="value" id="totalItems">-</div></div><div class="stat-card"><h3>Borrowed</h3><div class="value" id="borrowedItems">-</div></div><div class="stat-card"><h3>Overdue</h3><div class="value" id="overdueItems">-</div></div></div><div class="tab-nav"><button class="tab-btn active" data-tab="books" onclick="switchTab(\'books\')">📖 Items</button><button class="tab-btn" data-tab="transactions" onclick="switchTab(\'transactions\')">📋 Transactions</button></div><div id="tab-books" class="tab-content active"><div class="filter-row"><input type="text" id="bookSearch" placeholder="Search items..." oninput="renderBooks(this.value)"><button class="btn-primary" onclick="openBookModal()">+ Add Item</button></div><div class="table-container"><table class="data-table" id="booksTable"><thead><tr><th>Title</th><th>Author</th><th>Type</th><th>Category</th><th>Quantity</th><th>Available</th><th>Actions</th></tr></thead><tbody></tbody></table></div></div><div id="tab-transactions" class="tab-content"><div class="table-container"><table class="data-table" id="transactionsTable"><thead><tr><th>Book</th><th>Borrower</th><th>Borrow Date</th><th>Due Date</th><th>Returned</th><th>Status</th><th>Actions</th></tr></thead><tbody></tbody></table></div></div><div class="modal" id="bookModal"><div class="modal-overlay" onclick="closeBookModal()"></div><div class="modal-content"><span class="modal-close" onclick="closeBookModal()">&times;</span><h3 id="bookModalTitle">Add Item</h3><form id="bookForm" onsubmit="saveBook(event)"><input type="hidden" id="bookId"><div class="form-row"><div class="form-group"><label>Title *</label><input type="text" id="bookTitle" required></div><div class="form-group"><label>Author</label><input type="text" id="bookAuthor"></div></div><div class="form-row"><div class="form-group"><label>ISBN</label><input type="text" id="bookISBN"></div><div class="form-group"><label>Item Type</label><select id="itemType" onchange="togglePastPaperFields()"><option value="book">Book</option><option value="pamphlet">Pamphlet</option><option value="bible">Bible</option><option value="atlas">Atlas</option><option value="past_paper">Past Paper</option></select></div></div><div id="pastPaperFields"><div class="form-row"><div class="form-group"><label>Subject</label><input type="text" id="pastSubject"></div><div class="form-group"><label>Year</label><input type="text" id="pastYear" placeholder="e.g. 2022"></div></div><div class="form-group"><label>Exam Type</label><select id="pastExamType"><option value="">-- Select --</option><option value="GCE">GCE</option><option value="School Certificate">School Certificate</option></select></div></div><div class="form-row"><div class="form-group"><label>Category</label><select id="bookCategory"><option>General</option><option>Fiction</option><option>Non-Fiction</option><option>Science</option><option>History</option><option>Mathematics</option><option>Religion</option><option>Reference</option></select></div><div class="form-group"><label>Quantity</label><input type="number" id="bookQuantity" min="1" value="1"></div></div><button type="submit" class="btn-primary">Save</button></form></div></div><div class="modal" id="borrowModal"><div class="modal-overlay" onclick="closeBorrowModal()"></div><div class="modal-content" style="max-width:400px;"><span class="modal-close" onclick="closeBorrowModal()">&times;</span><h3>Borrow Item</h3><p><strong>Item:</strong> <span id="borrowBookTitle"></span></p><form id="borrowForm" onsubmit="borrowBook(event)"><input type="hidden" id="borrowBookId"><div class="form-group"><label>Borrower ID</label><input type="text" id="borrowerId" placeholder="Student/Staff ID"></div><div class="form-group"><label>Borrower Name *</label><input type="text" id="borrowerName" required></div><div class="form-group"><label>Type</label><select id="borrowerType"><option value="student">Student</option><option value="staff">Staff</option></select></div><button type="submit" class="btn-primary">Borrow</button></form></div></div>';
await loadData();renderBooks();window.switchTab=switchTab;window.renderBooks=renderBooks;window.openBookModal=openBookModal;window.closeBookModal=closeBookModal;window.saveBook=saveBook;window.editBook=editBook;window.deleteBook=deleteBook;window.togglePastPaperFields=togglePastPaperFields;window.openBorrowModal=openBorrowModal;window.closeBorrowModal=closeBorrowModal;window.borrowBook=borrowBook;window.showOverdueAlert=showOverdueAlert;
});
</script></body></html>
