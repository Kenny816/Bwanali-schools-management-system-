<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Classes – Bwanali</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body data-page="classes">
<script src="/shared.js"></script>
<div id="page-content"></div>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  const params = new URLSearchParams(window.location.search);
  const tenant = params.get('tenant') || 'demo';
  const token = sessionStorage.getItem('bwanali_token');
  if (!token) { window.location.href = '/login.html'; return; }
  let classes = [];
  const content = document.getElementById('page-content');
  content.innerHTML = '<div class="module-header"><h2>Classes & Sections</h2></div>Loading...';

  async function loadClasses() {
    const res = await fetch(`/api/classes?tenant=${tenant}`);
    const r = await res.json();
    classes = r.data || r;
    renderTable();
  }
  async function renderTable() {
    let counts = {};
    try {
      const cr = await fetch(`/api/classes/student-counts?tenant=${tenant}`);
      if (cr.ok) counts = await cr.json();
    } catch(e) {}
    const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
    const filtered = classes.filter(c => !search || c.name.toLowerCase().includes(search));
    if (!filtered.length) {
      content.innerHTML = '<div class="module-header"><h2>Classes & Sections</h2></div><p>No classes found.</p>';
      return;
    }
    let html = '<div class="module-header"><h2>Classes & Sections</h2></div><input type="text" id="searchInput" placeholder="Search classes..." style="padding:8px;margin-bottom:10px;width:200px;">';
    html += '<table class="data-table"><thead><tr><th>Name</th><th>Order</th><th>Section</th><th>Capacity</th><th>Teacher</th><th>Students</th></tr></thead><tbody>';
    filtered.forEach(c => {
      html += `<tr>
        <td>${c.name}</td><td>${c.numeric_order || '-'}</td><td>${c.section || '-'}</td><td>${c.capacity || '-'}</td><td>${c.class_teacher || '-'}</td>
        <td><span style="background:#1e3c72;color:#fff;border-radius:12px;padding:2px 10px;">${counts[c.name] || 0}</span></td>
      </tr>`;
    });
    html += '</tbody></table>';
    content.innerHTML = html;
    document.getElementById('searchInput').addEventListener('input', renderTable);
  }
  loadClasses();
});
</script>
</body>
</html>
