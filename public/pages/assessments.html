<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Assessments – Bwanali</title><link rel="stylesheet" href="/style.css"></head><body data-page="assessments"><script src="/shared.js"></script><script>
var params=new URLSearchParams(window.location.search),tenant=params.get("tenant")||"demo",assessments=[],classes=[];
async function loadData(){var r=await Promise.all([fetch("/api/assessments?tenant="+tenant),fetch("/api/classes?tenant="+tenant)]);assessments=await r[0].json();classes=await r[1].json();populateClassDropdown();renderTable();}
function populateClassDropdown(){var select=document.getElementById("assessmentClass");select.innerHTML='<option value="">-- Select Class --</option>';classes.forEach(function(c){select.innerHTML+='<option value="'+c.name+'">'+c.name+(c.section?" ("+c.section+")":"")+"</option>";});}
function renderTable(){var tbody=document.querySelector("#assessmentsTable tbody");tbody.innerHTML=assessments.map(function(a){return'<tr><td>'+a.name+'</td><td>'+(a.type||"Test")+'</td><td>'+a.date+'</td><td>'+(a.subject||"-")+'</td><td>'+(a.class||"-")+'</td><td>'+(a.max_score||100)+'</td><td class="actions"><button class="btn-icon edit-assessment" data-id="'+a.id+'">✏️</button><button class="btn-icon delete-assessment" data-id="'+a.id+'">🗑️</button></td></tr>';}).join("")||'<tr><td colspan="7">No assessments.</td></tr>';document.querySelectorAll(".edit-assessment").forEach(function(btn){btn.onclick=function(){editAssessment(btn.dataset.id);};});document.querySelectorAll(".delete-assessment").forEach(function(btn){btn.onclick=function(){deleteAssessment(btn.dataset.id);};});}
function openModal(a){populateClassDropdown();if(a){document.getElementById("assessmentId").value=a.id;document.getElementById("assessmentName").value=a.name;document.getElementById("assessmentType").value=a.type||"Test";document.getElementById("assessmentDate").value=a.date;document.getElementById("assessmentSubject").value=a.subject||"";document.getElementById("assessmentClass").value=a.class||"";document.getElementById("assessmentMaxScore").value=a.max_score||100;document.getElementById("modalTitle").textContent="Edit Assessment";}else{document.getElementById("assessmentForm").reset();document.getElementById("assessmentId").value="";document.getElementById("modalTitle").textContent="Add Assessment";}document.getElementById("assessmentModal").style.display="block";}
function closeModal(){document.getElementById("assessmentModal").style.display="none";}
async function saveAssessment(e){e.preventDefault();var id=document.getElementById("assessmentId").value,data={name:document.getElementById("assessmentName").value,type:document.getElementById("assessmentType").value,date:document.getElementById("assessmentDate").value,subject:document.getElementById("assessmentSubject").value,class:document.getElementById("assessmentClass").value,max_score:parseInt(document.getElementById("assessmentMaxScore").value)||100};var url=id?"/api/assessments/"+id+"?tenant="+tenant:"/api/assessments?tenant="+tenant,method=id?"PUT":"POST";var res=await fetch(url,{method:method,headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});if(res.ok){closeModal();loadData();window.showNotification("Assessment saved!","success");}else{var err=await res.json();window.showNotification(err.error||"Could not save","error");}}
function editAssessment(id){var a=assessments.find(function(a){return a.id===id;});if(a)openModal(a);}
async function deleteAssessment(id){if(!confirm("Delete?"))return;await fetch("/api/assessments/"+id+"?tenant="+tenant,{method:"DELETE"});loadData();}
document.addEventListener("DOMContentLoaded",async function(){
document.getElementById("page-content").innerHTML='<div class="module-header"><h2>Assessments / Tests</h2><button class="btn-primary" id="addAssessmentBtn">+ Add Assessment</button></div><div class="modal" id="assessmentModal"><div class="modal-overlay"></div><div class="modal-content"><span class="modal-close" id="closeAssessmentModalBtn">&times;</span><h3 id="modalTitle">Add Assessment</h3><form id="assessmentForm"><input type="hidden" id="assessmentId"><div class="form-row"><div class="form-group"><label>Name *</label><input type="text" id="assessmentName" required></div><div class="form-group"><label>Type</label><select id="assessmentType"><option>Test</option><option>Exam</option><option>Quiz</option><option>Assignment</option></select></div></div><div class="form-row"><div class="form-group"><label>Date *</label><input type="date" id="assessmentDate" required></div><div class="form-group"><label>Subject</label><input type="text" id="assessmentSubject" placeholder="e.g., Mathematics"></div></div><div class="form-row"><div class="form-group"><label>Class *</label><select id="assessmentClass" required><option value="">-- Select Class --</option></select></div><div class="form-group"><label>Max Score</label><input type="number" id="assessmentMaxScore" value="100"></div></div><div class="form-actions"><button type="button" class="btn-secondary" id="cancelAssessmentBtn">Cancel</button><button type="submit" class="btn-primary">Save</button></div></form></div></div><div class="table-container"><table class="data-table" id="assessmentsTable"><thead><tr><th>Name</th><th>Type</th><th>Date</th><th>Subject</th><th>Class</th><th>Max Score</th><th>Actions</th></tr></thead><tbody></tbody></table></div>';
await loadData();document.getElementById("addAssessmentBtn").addEventListener("click",function(){openModal();});document.getElementById("closeAssessmentModalBtn").addEventListener("click",closeModal);document.getElementById("cancelAssessmentBtn").addEventListener("click",closeModal);document.querySelector("#assessmentModal .modal-overlay").addEventListener("click",closeModal);document.getElementById("assessmentForm").addEventListener("submit",saveAssessment);
});
</script></body></html>
