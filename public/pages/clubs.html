<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Clubs – Bwanali</title><link rel="stylesheet" href="/style.css"></head><body data-page="clubs"><script src="/shared.js"></script><script>
var params=new URLSearchParams(window.location.search),tenant=params.get("tenant")||"demo",clubs=[],staff=[];
async function loadData(){var r=await Promise.all([fetch("/api/committees?tenant="+tenant),fetch("/api/staff?tenant="+tenant)]);var all=await r[0].json();clubs=all.filter(function(c){return c.name.toLowerCase().indexOf("club")!==-1;});staff=await r[1].json();renderTable();}
function renderTable(){var tb=document.querySelector("#clubsTable tbody");tb.innerHTML="";if(!clubs.length){tb.innerHTML='<tr><td colspan="5">No clubs.</td></tr>';return;}clubs.forEach(function(c){var chairPos=(c.positions||[]).find(function(p){return p.position==="Chairperson";});var chair=staff.find(function(s){return s.id===(chairPos?chairPos.staff_id:null);});var cn=chair?chair.first_name+" "+chair.last_name:"-";var total=((c.positions||[]).filter(function(p){return p.staff_id;}).length)+(c.members||[]).length;var row=document.createElement("tr");row.innerHTML='<td>'+c.name+'</td><td>'+(c.description||"-")+'</td><td>'+cn+'</td><td>'+total+'</td><td><button class="btn-icon edit-club" data-id="'+c.id+'">✏️</button><button class="btn-icon delete-club" data-id="'+c.id+'">🗑️</button></td>';tb.appendChild(row);});document.querySelectorAll(".edit-club").forEach(function(b){b.onclick=function(){editClub(b.dataset.id);};});document.querySelectorAll(".delete-club").forEach(function(b){b.onclick=function(){deleteClub(b.dataset.id);};});}
function openModal(c){var cont=document.getElementById("positionsContainer");cont.innerHTML="";["Chairperson","Vice Chairperson","Secretary","Treasurer"].forEach(function(pos){var existing=(c?c.positions||[]:[]).find(function(p){return p.position===pos;});var sid=existing?existing.staff_id:"";var div=document.createElement("div");div.className="form-row";div.innerHTML='<div class="form-group"><label>'+pos+'</label><select class="position-staff"><option value="">-- Vacant --</option>'+staff.map(function(s){return'<option value="'+s.id+'"'+(s.id===sid?" selected":"")+'>'+s.first_name+" "+s.last_name+"</option>";}).join("")+"</select></div>";cont.appendChild(div);});if(c){document.getElementById("clubId").value=c.id;document.getElementById("clubName").value=c.name;document.getElementById("clubDescription").value=c.description||"";}else{document.getElementById("clubForm").reset();document.getElementById("clubId").value="";}document.getElementById("clubModal").style.display="block";}
function closeModal(){document.getElementById("clubModal").style.display="none";}
async function saveClub(e){e.preventDefault();var id=document.getElementById("clubId").value,name=document.getElementById("clubName").value,desc=document.getElementById("clubDescription").value;var positions=[];document.querySelectorAll("#positionsContainer .form-row").forEach(function(div){var pos=div.querySelector("label").textContent,staffId=div.querySelector("select").value;if(pos&&staffId)positions.push({position:pos,staff_id:staffId});});var data={name:name,description:desc,positions:positions,members:[]};var url=id?"/api/committees/"+id+"?tenant="+tenant:"/api/committees?tenant="+tenant,method=id?"PUT":"POST";await fetch(url,{method:method,headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});closeModal();loadData();}
function editClub(id){var c=clubs.find(function(c){return c.id===id;});if(c)openModal(c);}
function deleteClub(id){if(confirm("Delete?")){fetch("/api/committees/"+id+"?tenant="+tenant,{method:"DELETE"}).then(loadData);}}
document.addEventListener("DOMContentLoaded",async function(){
document.getElementById("page-content").innerHTML='<div class="module-header"><h2>Clubs</h2><button class="btn-primary" id="addClubBtn">+ Add Club</button></div><div class="modal" id="clubModal"><div class="modal-overlay"></div><div class="modal-content"><span class="modal-close" id="closeClubModalBtn">&times;</span><h3>Add Club</h3><form id="clubForm"><input type="hidden" id="clubId"><div class="form-row"><div class="form-group"><label>Name</label><input type="text" id="clubName" required></div><div class="form-group"><label>Description</label><input type="text" id="clubDescription"></div></div><fieldset><legend>Positions</legend><div id="positionsContainer"></div></fieldset><div class="form-actions"><button type="button" class="btn-secondary" id="cancelClubBtn">Cancel</button><button type="submit" class="btn-primary">Save</button></div></form></div></div><div class="table-container"><table class="data-table" id="clubsTable"><thead><tr><th>Name</th><th>Description</th><th>Chairperson</th><th>Members</th><th>Actions</th></tr></thead><tbody></tbody></table></div>';
await loadData();document.getElementById("addClubBtn").addEventListener("click",function(){openModal();});document.getElementById("closeClubModalBtn").addEventListener("click",closeModal);document.getElementById("cancelClubBtn").addEventListener("click",closeModal);document.querySelector("#clubModal .modal-overlay").addEventListener("click",closeModal);document.getElementById("clubForm").addEventListener("submit",saveClub);
});
</script></body></html>
