<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Results – Bwanali</title><link rel="stylesheet" href="/style.css"><style>.score-input{width:80px;}@media print{body *{visibility:hidden;}#printable-results,#printable-results *{visibility:visible;}#printable-results{position:absolute;top:0;left:0;width:100%;padding:20px;}.no-print{display:none!important;}}</style></head><body data-page="results"><script src="/shared.js"></script><script>
var params=new URLSearchParams(window.location.search),tenant=params.get("tenant")||"demo",classes=[],assessments=[],students=[],results=[];
async function loadInitial(){var r=await Promise.all([fetch("/api/classes?tenant="+tenant),fetch("/api/assessments?tenant="+tenant)]);classes=await r[0].json();assessments=await r[1].json();populateDropdowns();}
function populateDropdowns(){var classSelect=document.getElementById("filterClass");classSelect.innerHTML='<option value="">-- Select Class --</option>'+classes.map(function(c){return'<option value="'+c.name+'">'+c.name+(c.section?" ("+c.section+")":"")+"</option>";}).join("");var assessSelect=document.getElementById("filterAssessment");assessSelect.innerHTML='<option value="">-- Select Assessment --</option>'+assessments.map(function(a){return'<option value="'+a.id+'">'+a.name+" ("+(a.subject||"")+")</option>";}).join("");}
async function loadResults(){var className=document.getElementById("filterClass").value,assessmentId=document.getElementById("filterAssessment").value;if(!className||!assessmentId)return alert("Select class and assessment.");var r=await Promise.all([fetch("/api/enrollments?tenant="+tenant+"&class_name="+encodeURIComponent(className)),fetch("/api/results?tenant="+tenant+"&assessment_id="+assessmentId+"&class_name="+encodeURIComponent(className))]);students=await r[0].json();results=await r[1].json();renderTable();}
function renderTable(){var assessment=assessments.find(function(a){return a.id===document.getElementById("filterAssessment").value;});var maxScore=assessment?assessment.max_score:100;var tbody=document.querySelector("#resultsTable tbody");tbody.innerHTML=students.map(function(s){var existing=results.find(function(r){return r.student_id===s.id;});var score=existing?existing.score:"";var percentage=score?Math.round((score/maxScore)*100):"";return'<tr><td>'+s.admission_no+'</td><td>'+s.first_name+" "+s.last_name+'</td><td><input type="number" id="score_'+s.id+'" class="score-input" value="'+score+'" min="0" max="'+maxScore+'"></td><td><span id="percent_'+s.id+'">'+(percentage?percentage+"%":"")+'</span></td><td>'+(existing?"Saved":"Not saved")+'</td><td><button class="btn-icon share-result" data-id="'+s.id+'">📤</button></td></tr>';}).join("")||'<tr><td colspan="6">No students.</td></tr>';students.forEach(function(s){document.getElementById("score_"+s.id).addEventListener("input",function(){var val=parseInt(this.value);if(!isNaN(val))document.getElementById("percent_"+s.id).textContent=Math.round((val/maxScore)*100)+"%";else document.getElementById("percent_"+s.id).textContent="";});});
document.querySelectorAll(".share-result").forEach(function(btn){btn.onclick=function(){shareResult(btn.dataset.id);};});}
async function saveScores(){var assessmentId=document.getElementById("filterAssessment").value;var promises=students.map(function(s){var scoreInput=document.getElementById("score_"+s.id);if(scoreInput&&scoreInput.value!==""){return fetch("/api/results?tenant="+tenant,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({student_id:s.id,assessment_id:assessmentId,score:parseInt(scoreInput.value)})});}});await Promise.all(promises);window.showNotification("Scores saved!","success");loadResults();}
function printResults(){var className=document.getElementById("filterClass").value,assessment=assessments.find(function(a){return a.id===document.getElementById("filterAssessment").value;}),maxScore=assessment?assessment.max_score:100;var html='<h2>Results: '+(assessment?assessment.name:"")+" ("+className+")</h2><table class=\"data-table\"><thead><tr><th>Adm No</th><th>Name</th><th>Score</th><th>Percentage</th></tr></thead><tbody>';students.forEach(function(s){var scoreInput=document.getElementById("score_"+s.id),score=scoreInput?scoreInput.value:"",percent=score?Math.round((score/maxScore)*100)+"%":"";html+='<tr><td>'+s.admission_no+'</td><td>'+s.first_name+" "+s.last_name+'</td><td>'+score+'</td><td>'+percent+"</td></tr>";});html+="</tbody></table>";document.getElementById("printable-results").innerHTML=html;window.print();}
function shareResult(studentId){var student=students.find(function(s){return s.id===studentId;}),assessment=assessments.find(function(a){return a.id===document.getElementById("filterAssessment").value;}),scoreInput=document.getElementById("score_"+studentId),score=scoreInput?scoreInput.value:"",maxScore=assessment?assessment.max_score:100,percent=score?Math.round((score/maxScore)*100):"",message="Results for "+student.first_name+" "+student.last_name+": "+assessment.name+" - Score: "+score+"/"+maxScore+" ("+percent+"%)",encoded=encodeURIComponent(message);document.getElementById("shareContent").innerHTML='<p>'+message+'</p><a href="sms:?body='+encoded+'" class="btn-primary">📱 SMS</a> <a href="https://wa.me/?text='+encoded+'" class="btn-primary" style="background:#25D366;">💬 WhatsApp</a> <a href="mailto:?subject=Results&body='+encoded+'" class="btn-primary" style="background:#d44637;">📧 Email</a>';document.getElementById("shareModal").style.display="block";}
function closeShare(){document.getElementById("shareModal").style.display="none";}
document.addEventListener("DOMContentLoaded",async function(){
document.getElementById("page-content").innerHTML='<div class="module-header"><h2>Results Management</h2></div><div class="filter-row" style="margin-bottom:20px;"><select id="filterClass"><option value="">-- Select Class --</option></select><select id="filterAssessment"><option value="">-- Select Assessment --</option></select><button class="btn-primary" id="loadResultsBtn">Load</button></div><div class="table-container"><table class="data-table" id="resultsTable"><thead><tr><th>Adm No</th><th>Name</th><th>Score</th><th>Percentage</th><th>Status</th><th>Share</th></tr></thead><tbody></tbody></table></div><div class="form-actions"><button class="btn-primary" id="saveScoresBtn">Save Scores</button><button class="btn-secondary no-print" onclick="printResults()">🖨️ Print</button></div><div id="printable-results"></div><div class="modal" id="shareModal"><div class="modal-overlay" onclick="closeShare()"></div><div class="modal-content" style="max-width:400px;"><span class="modal-close" onclick="closeShare()">&times;</span><h3>Share Result</h3><div id="shareContent"></div></div></div>';
await loadInitial();document.getElementById("loadResultsBtn").addEventListener("click",loadResults);document.getElementById("saveScoresBtn").addEventListener("click",saveScores);
});
</script></body></html>
