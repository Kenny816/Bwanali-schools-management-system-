<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Attendance – Bwanali</title><link rel="stylesheet" href="/style.css"></head><body data-page="attendance"><script src="/shared.js"></script><script>
var params=new URLSearchParams(window.location.search),tenant=params.get("tenant")||"demo",classes=[],staff=[],attendanceRecords=[],students=[];
async function loadData(){var r=await Promise.all([fetch("/api/classes?tenant="+tenant),fetch("/api/staff?tenant="+tenant)]);classes=await r[0].json();staff=await r[1].json();renderClassList();}
function renderClassList(){var container=document.getElementById("classList");container.innerHTML=classes.map(function(c){return'<div class="stat-card" onclick="selectClass(\''+c.id+'\',\''+c.name+'\')"><h3>'+c.name+(c.section?" ("+c.section+")":"")+'</h3><p>Teacher: '+(staff.find(function(s){return s.id===c.teacher_id;})?staff.find(function(s){return s.id===c.teacher_id;}).first_name:"—")+"</p></div>";}).join("")||"<p>No classes.</p>";}
function selectClass(classId,className){document.getElementById("selectedClassName").textContent=className;document.getElementById("attendanceSection").style.display="block";loadStudentsForClass(className);}
async function loadStudentsForClass(className){var res=await fetch("/api/enrollments?tenant="+tenant+"&class_name="+encodeURIComponent(className));students=await res.json();renderAttendanceForm();}
async function loadAttendanceForDate(className,date){var res=await fetch("/api/attendance?tenant="+tenant+"&class_name="+encodeURIComponent(className)+"&date="+date);attendanceRecords=await res.json();renderAttendanceForm();}
function renderAttendanceForm(){var container=document.getElementById("attendanceFormContainer");if(!students.length){container.innerHTML="<p>No students in this class.</p>";return;}container.innerHTML=students.map(function(s){var existing=attendanceRecords.find(function(r){return r.student_id===s.id;});return'<div class="form-row"><span>'+s.first_name+" "+s.last_name+" ("+s.admission_no+')</span><select id="status_'+s.id+'"><option value="Present"'+(existing&&existing.status==="Present"?" selected":"")+'>Present</option><option value="Absent"'+(existing&&existing.status==="Absent"?" selected":"")+'>Absent</option><option value="Late"'+(existing&&existing.status==="Late"?" selected":"")+'>Late</option></select><input type="text" id="remarks_'+s.id+'" placeholder="Remarks" value="'+(existing?existing.remarks||"":"")+'"></div>';}).join("");}
async function saveAttendance(){var date=document.getElementById("attendanceDate").value;var records=students.map(function(s){return{student_id:s.id,class_name:s.class,status:document.getElementById("status_"+s.id).value,remarks:document.getElementById("remarks_"+s.id).value};});var res=await fetch("/api/attendance/batch?tenant="+tenant,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({date:date,records:records})});if(res.ok){window.showNotification("Attendance saved!","success");loadAttendanceForDate(students[0]?students[0].class:"",date);}else{var err=await res.json();window.showNotification(err.error||"Could not save","error");}}
document.addEventListener("DOMContentLoaded",async function(){
document.getElementById("page-content").innerHTML='<div class="module-header"><h2>Pupil Attendance</h2></div><div style="display:grid;grid-template-columns:1fr 2fr;gap:20px;"><div><h3>Classes</h3><div id="classList"></div></div><div id="attendanceSection" style="display:none;"><h3>Attendance for <span id="selectedClassName"></span></h3><div class="form-row"><div class="form-group"><label>Date</label><input type="date" id="attendanceDate" value="'+new Date().toISOString().split("T")[0]+'"></div></div><div id="attendanceFormContainer"></div><button class="btn-primary" id="saveAttendanceBtn" style="margin-top:15px;">Save Attendance</button></div></div>';
await loadData();document.getElementById("attendanceDate").addEventListener("change",function(){var cls=document.getElementById("selectedClassName").textContent;if(cls)loadAttendanceForDate(cls,this.value);});document.getElementById("saveAttendanceBtn").addEventListener("click",saveAttendance);
});
</script></body></html>
