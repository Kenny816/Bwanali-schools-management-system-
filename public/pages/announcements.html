<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Announcements – Bwanali</title><link rel="stylesheet" href="/style.css"><style>.priority-badge{padding:4px 10px;border-radius:12px;font-size:13px;}.priority-High{background:#f8d7da;color:#721c24;}.priority-Medium{background:#fff3cd;color:#856404;}.priority-Low{background:#d4edda;color:#155724;}</style></head><body data-page="announcements"><script src="/shared.js"></script><script>
var params=new URLSearchParams(window.location.search),tenant=params.get("tenant")||"demo",announcements=[];
async function loadAnnouncements(filter){filter=filter||{};var url="/api/announcements?tenant="+tenant;if(filter.audience)url+="&audience="+encodeURIComponent(filter.audience);var res=await fetch(url);announcements=await res.json();renderTable();}
function renderTable(){var tbody=document.querySelector("#announcementsTable tbody");tbody.innerHTML=announcements.map(function(a){return'<tr><td>'+a.title+'</td><td>'+(a.type||"General")+'</td><td><span class="priority-badge priority-'+(a.priority||"Medium")+'">'+(a.priority||"Medium")+'</span></td><td>'+(a.target_audience||"All")+'</td><td>'+new Date(a.created_at).toLocaleDateString()+'</td><td class="actions"><button class="btn-icon view-announcement" data-id="'+a.id+'">👁️</button><button class="btn-icon edit-announcement" data-id="'+a.id+'">✏️</button><button class="btn-icon delete-announcement" data-id="'+a.id+'">🗑️</button></td></tr>';}).join("")||'<tr><td colspan="6">No announcements.</td></tr>';document.querySelectorAll(".view-announcement").forEach(function(b){b.onclick=function(){viewAnnouncement(b.dataset.id);};});document.querySelectorAll(".edit-announcement").forEach(function(b){b.onclick=function(){openForm(b.dataset.id);};});document.querySelectorAll(".delete-announcement").forEach(function(b){b.onclick=function(){deleteAnnouncement(b.dataset.id);};});}
function openForm(id){if(id){var a=announcements.find(function(a){return a.id===id;});if(!a)return;document.getElementById("announcementId").value=a.id;document.getElementById("announcementTitle").value=a.title;document.getElementById("announcementType").value=a.type||"General";document.getElementById("announcementAudience").value=a.target_audience||"All";document.getElementById("announcementPriority").value=a.priority||"Medium";document.getElementById("announcementLabels").value=a.labels||"";document.getElementById("announcementMessage").value=a.message||"";}else{document.getElementById("announcementForm").reset();document.getElementById("announcementId").value="";}document.getElementById("announcementModal").style.display="block";}
function closeForm(){document.getElementById("announcementModal").style.display="none";}
async function saveAnnouncement(e){e.preventDefault();var id=document.getElementById("announcementId").value,data={title:document.getElementById("announcementTitle").value,message:document.getElementById("announcementMessage").value,type:document.getElementById("announcementType").value,target_audience:document.getElementById("announcementAudience").value,priority:document.getElementById("announcementPriority").value,labels:document.getElementById("announcementLabels").value};var url=id?"/api/announcements/"+id+"?tenant="+tenant:"/api/announcements?tenant="+tenant,method=id?"PUT":"POST";var res=await fetch(url,{method:method,headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});if(res.ok){closeForm();loadAnnouncements();window.showNotification("Announcement saved!","success");}else{var err=await res.json();window.showNotification(err.error||"Could not save","error");}}
function viewAnnouncement(id){var a=announcements.find(function(a){return a.id===id;});if(!a)return;document.getElementById("viewContent").innerHTML='<h3>'+a.title+'</h3><p>Type: '+a.type+' | Audience: '+a.target_audience+' | Priority: '+a.priority+'</p><p>'+a.message+'</p><small>'+new Date(a.created_at).toLocaleString()+"</small>";document.getElementById("viewModal").style.display="block";}
function closeView(){document.getElementById("viewModal").style.display="none";}
async function deleteAnnouncement(id){if(!confirm("Delete?"))return;await fetch("/api/announcements/"+id+"?tenant="+tenant,{method:"DELETE"});loadAnnouncements();}
document.addEventListener("DOMContentLoaded",async function(){
document.getElementById("page-content").innerHTML='<div class="module-header"><h2>Announcements</h2><button class="btn-primary" onclick="openForm()">+ New Announcement</button></div><div class="filter-row"><select id="audienceFilter" onchange="loadAnnouncements({audience:this.value})"><option value="">All Audiences</option><option value="All">All</option><option value="Teachers">Teachers</option><option value="Students">Students</option><option value="Parents">Parents</option></select></div><div class="table-container"><table class="data-table" id="announcementsTable"><thead><tr><th>Title</th><th>Type</th><th>Priority</th><th>Audience</th><th>Date</th><th>Actions</th></tr></thead><tbody></tbody></table></div><div class="modal" id="announcementModal"><div class="modal-overlay" onclick="closeForm()"></div><div class="modal-content" style="max-width:600px;"><span class="modal-close" onclick="closeForm()">&times;</span><h3>Announcement</h3><form id="announcementForm" onsubmit="saveAnnouncement(event)"><input type="hidden" id="announcementId"><div class="form-group"><label>Title *</label><input type="text" id="announcementTitle" required></div><div class="form-row"><div class="form-group"><label>Type</label><select id="announcementType"><option>General</option><option>Event</option><option>Reminder</option><option>Urgent</option></select></div><div class="form-group"><label>Audience</label><select id="announcementAudience"><option>All</option><option>Teachers</option><option>Students</option><option>Parents</option></select></div></div><div class="form-row"><div class="form-group"><label>Priority</label><select id="announcementPriority"><option>Low</option><option>Medium</option><option>High</option></select></div><div class="form-group"><label>Labels</label><input type="text" id="announcementLabels" placeholder="comma separated"></div></div><div class="form-group"><label>Message</label><textarea id="announcementMessage" rows="4" required></textarea></div><button type="submit" class="btn-primary">Save</button></form></div></div><div class="modal" id="viewModal"><div class="modal-overlay" onclick="closeView()"></div><div class="modal-content" style="max-width:500px;"><span class="modal-close" onclick="closeView()">&times;</span><div id="viewContent"></div></div></div>';
await loadAnnouncements();window.openForm=openForm;window.closeForm=closeForm;window.saveAnnouncement=saveAnnouncement;window.viewAnnouncement=viewAnnouncement;window.closeView=closeView;window.deleteAnnouncement=deleteAnnouncement;
});
</script></body></html>
