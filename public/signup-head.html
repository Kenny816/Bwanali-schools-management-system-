<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sign Up – Head Teacher</title><link rel="stylesheet" href="style.css"><style>.login-card{max-width:500px;}</style></head><body class="login-bg"><div class="login-card"><div class="login-header"><h1>BWANALI</h1><p>Create Head Teacher Account</p></div><form id="signupForm"><div class="input-group"><label>Full Name *</label><input type="text" id="fullName" placeholder="e.g. John Banda" required></div><div class="input-group"><label>Email *</label><input type="email" id="email" placeholder="you@school.com" required></div><div class="input-group"><label>Password *</label><input type="password" id="password" placeholder="Min. 6 characters" required minlength="6"></div><hr style="margin:20px 0;"><h3 style="color:#1e3c72;margin-bottom:15px;">School Information</h3><div class="input-group"><label>School Name *</label><input type="text" id="schoolName" placeholder="e.g. Greenfield Academy" required></div><div class="input-group"><label>Location</label><input type="text" id="location" placeholder="e.g. Lusaka, Zambia"></div><div class="input-group"><label>EMIS Number</label><input type="text" id="emis" placeholder="e.g. EMIS-2025-001"></div><div class="input-group"><label>School Type *</label><select id="schoolType" required><option value="">-- Select Type --</option><option value="government-no-fees">Government School – No Fees</option><option value="government-some-fees">Government School – Some Fees</option><option value="private">Private School – Pays All Fees</option></select></div><button type="submit" class="btn-primary" style="width:100%;">Sign Up</button><div id="error-message" class="error-msg"></div><div id="success-message" style="color:green;margin-top:10px;text-align:center;"></div></form><div style="text-align:center;margin-top:15px;"><a href="/login.html" style="color:#1e3c72;text-decoration:none;">← Back to Login</a></div></div><script>
document.getElementById("signupForm").addEventListener("submit",function(e){e.preventDefault();var fullName=document.getElementById("fullName").value.trim(),email=document.getElementById("email").value.trim(),password=document.getElementById("password").value,schoolName=document.getElementById("schoolName").value.trim(),location=document.getElementById("location").value.trim(),emis=document.getElementById("emis").value.trim(),schoolType=document.getElementById("schoolType").value,errEl=document.getElementById("error-message"),sucEl=document.getElementById("success-message");errEl.innerText="";sucEl.innerText="";fetch("/api/auth/register-admin",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email,password:password,fullName:fullName,schoolName:schoolName,location:location,emis:emis,schoolType:schoolType})}).then(function(r){return r.json();}).then(function(data){if(data.tenant){sucEl.innerText='Account created! Your school code is "'+data.tenant+'". Redirecting to login...';setTimeout(function(){window.location.href="/login.html?tenant="+data.tenant;},3000);}else{errEl.innerText=data.error||"Signup failed";}}).catch(function(){errEl.innerText="Network error. Please try again.";});});
</script></body></html>
