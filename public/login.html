<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Bwanali Login</title><link rel="stylesheet" href="style.css"></head><body class="login-bg"><div class="login-card"><div class="login-header"><h1>BWANALI</h1><p>School Management System</p></div><form id="loginForm"><div class="input-group"><label>Email</label><input type="email" id="email" placeholder="you@school.com" required autofocus></div><div class="input-group"><label>Password</label><input type="password" id="password" placeholder="Password" required></div><button type="submit" class="btn-primary" style="width:100%;">Sign In</button><div id="error-message" class="error-msg"></div></form><div style="text-align:center;margin-top:15px;"><a href="/signup-head.html" class="btn-secondary" style="display:inline-block;padding:10px 20px;border-radius:6px;text-decoration:none;color:#333;">Sign Up as Head Teacher</a></div><div class="school-badge" id="schoolName">Loading school...</div></div><script>
var params=new URLSearchParams(window.location.search),tenant=params.get("tenant")||"demo";
fetch("/api/tenant?tenant="+tenant).then(function(r){return r.json();}).then(function(d){document.getElementById("schoolName").innerText=d.name||("School: "+tenant);}).catch(function(){document.getElementById("schoolName").innerText="School: "+tenant;});
document.getElementById("loginForm").addEventListener("submit",function(e){e.preventDefault();var email=document.getElementById("email").value,password=document.getElementById("password").value,errEl=document.getElementById("error-message");errEl.innerText="";fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email,password:password})}).then(function(r){return r.json();}).then(function(data){if(data.token){sessionStorage.setItem("bwanali_token",data.token);sessionStorage.setItem("bwanali_user",JSON.stringify(data.user));sessionStorage.setItem("bwanali_tenant",tenant);sessionStorage.setItem("school_type",data.user.type);var role=data.user.role;if(role==="admin")window.location.href="/pages/dashboard.html?tenant="+tenant;else if(["teacher","head_teacher","senior_teacher","hod"].indexOf(role)!==-1)window.location.href="/pages/teacher.html?tenant="+tenant;else if(role==="deputy")window.location.href="/pages/deputy.html?tenant="+tenant;else if(role==="accountant")window.location.href="/pages/accountant.html?tenant="+tenant;else if(role==="guidance")window.location.href="/pages/guidance.html?tenant="+tenant;else window.location.href="/pages/dashboard.html?tenant="+tenant;}else{errEl.innerText=data.error||"Login failed";}}).catch(function(){errEl.innerText="Network error. Is the server running?";});});
</script></body></html>
